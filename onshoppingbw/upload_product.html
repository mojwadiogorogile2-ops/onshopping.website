<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0"> 

<title>Upload Product</title>

<style>

body{
font-family:Arial;
background-image: url("images/background3.jpg");
background-size: cover;
background-position: center;
background-repeat: no-repeat;
min-height: 100vh;
}

.container{
width:500px;
margin:auto;
margin-top:40px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px #ccc;
}

input, select, textarea{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#ff6600;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#e65c00;
}

@media (max-width:600px){

.products{
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.product-card img{
height:130px;
}

}

</style>

</head>

<body>

<div class="container">

<h2>Upload Product</h2>

<form action="upload_product.php" method="POST" enctype="multipart/form-data">

<input type="text" name="product_name" placeholder="Product Name" required>

<select name="category" required>
<option value="">Select Category</option>
<option>Electronics</option>
<option>Clothing</option>
<option>Shoes</option>
<option>Furniture</option>
<option>Phones</option>
<option>Other</option>
</select>

<select name="location" required>
<option value="">Select Location</option>
<option>Gaborone</option>
<option>Francistown</option>
<option>Maun</option>
<option>Kasane</option>
<option>Palapye</option>
<option>Lobatse</option>
<option>Serowe</option>
</select>

<input type="number" name="price" placeholder="Enter price" required>

<textarea name="description" placeholder="Product Description"></textarea>

<input type="text" name="seller_whatsapp" placeholder="Seller WhatsApp Number" required>

<input type="file" name="image" required>

<button type="submit">Upload Product</button>

</form>

</div>

</body>
</html>
