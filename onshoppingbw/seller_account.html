<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">   
<title>Seller Account - OnShopping BW</title>

<style>

body{
font-family: Arial;
background-image: url("images/background2.jpg");
background-size: cover;
background-position: center;
background-repeat: no-repeat;
min-height: 100vh;
}

.container{
width:400px;
margin:auto;
margin-top:80px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

h2{
text-align:center;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
margin-top:15px;
background:#050589;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0a05a5;
}

.switch{
text-align:center;
margin-top:15px;
color:blue;
cursor:pointer;
}

@media (max-width:600px){

.products{
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.product-card img{
height:130px;
}

}

</style>

<script>

function showLogin(){
document.getElementById("registerForm").style.display="none";
document.getElementById("loginForm").style.display="block";
}

function showRegister(){
document.getElementById("loginForm").style.display="none";
document.getElementById("registerForm").style.display="block";
}

</script>

</head>

<body>

<div class="container">

<!-- REGISTER FORM -->

<div id="registerForm">

<h2>Create Seller Account</h2>

<form action="register.php" method="POST" enctype="multipart/form-data">

<input type="text" name="business_name" placeholder="Business Name (Username)" required> 

<label>Profile Picture</label><br>
<input type="file" name="profile_pic" required><br><br>

<input type="text" name="name" placeholder="Full Name" required>

<input type="text" name="whatsapp" placeholder="WhatsApp Number" required>

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Create Password" required>

<br><br>

<label style="font-size:14px;">
<input type="checkbox" required>
I agree to the <a href="terms.html">Terms</a> and 
<a href="privacy.html">Privacy Policy</a>
</label>

<br><br>

<button type="submit">Create Account</button>

</form>

<div class="switch" onclick="showLogin()">
Already have an account? Login
</div>

</div>


<!-- LOGIN FORM -->

<div id="loginForm" style="display:none;">

<h2>Seller Login</h2>

<form action="login.php" method="POST">

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<div class="switch" onclick="showRegister()">
Create new account
</div>

</div>

</div>

</body>
</html>
